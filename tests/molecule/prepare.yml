---
- name: Ensure Python is installed
  hosts: all
  gather_facts: false
  tasks:
    - name: Ensure apt is updated
      ansible.builtin.raw: apt-get update
      changed_when: false

    - name: Install system dependencies (sudo, Python, pip)
      ansible.builtin.raw: apt-get install -y sudo python3 python3-pip
      changed_when: false

    - name: Install python dependencies
      ansible.builtin.raw: pip install pytest-testinfra molecule-docker
      changed_when: false
