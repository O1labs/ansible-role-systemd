---
- name: Create unit configuration path
  become: true
  when: unit_item.path is defined
  ansible.builtin.file:
    path: "{{ unit_item.path }}"
    state: directory
    mode: "0755"
  loop: "{{ unit_config }}"
  loop_control:
    loop_var: unit_item
    label: "{{ unit_item.name }}.{{ unit_item.type | default(_default_unit_type) }}"
  tags:
    - config

- name: Render systemd unit files
  become: true
  vars:
    config: "{{ unit_item }}"
    unit_dest: "{{ unit_item.path | default(_default_unit_path) }}/{{ unit_item.name }}.{{ unit_item.type | default(_default_unit_type) }}"
  ansible.builtin.template:
    src: systemd.unit.j2
    dest: "{{ unit_dest }}"
    owner: root
    group: root
    mode: "0644"
    backup: "{{ systemd_backup_files | default(_default_systemd_backup_files) }}"
  loop: "{{ unit_config }}"
  loop_control:
    loop_var: unit_item
    label: "{{ unit_item.name }}.{{ unit_item.type | default(_default_unit_type) }}"
  when: unit_item.type | default(_default_unit_type) != 'conf'
  register: render_units
  notify: Reload systemd units
  tags:
    - config
    - molecule-idempotence-notest

- name: Render systemd drop-in files
  become: true
  vars:
    config: "{{ unit_item }}"
    unit_dest: "{{ unit_item.path | default(_default_unit_path) }}/{{ unit_item.name }}.{{ unit_item.type | default(_default_unit_type) }}"
  ansible.builtin.template:
    src: override.conf.j2
    dest: "{{ unit_dest }}"
    owner: root
    group: root
    mode: "0644"
    backup: "{{ systemd_backup_files | default(_default_systemd_backup_files) }}"
  loop: "{{ unit_config }}"
  loop_control:
    loop_var: unit_item
    label: "{{ unit_item.name }}.{{ unit_item.type | default(_default_unit_type) }}"
  when: unit_item.type | default(_default_unit_type) == 'conf'
  register: render_dropins
  notify: Reload systemd daemon
  tags:
    - config
